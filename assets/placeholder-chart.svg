<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#fafafa"/>
  <g font-family="Inter, system-ui, sans-serif" fill="#0e0e10">
    <text x="120" y="140" font-size="28" font-weight="600">Success rate by task</text>
    <text x="120" y="170" font-size="15" fill="#6b6b72">Placeholder chart · replace with your figure</text>
  </g>
  <!-- axes -->
  <g stroke="#c9d0db" stroke-width="1.5" fill="none">
    <line x1="160" y1="220" x2="160" y2="780"/>
    <line x1="160" y1="780" x2="1500" y2="780"/>
  </g>
  <!-- gridlines + labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6b6b72">
    <line x1="160" y1="640" x2="1500" y2="640" stroke="#eceff3"/>
    <line x1="160" y1="500" x2="1500" y2="500" stroke="#eceff3"/>
    <line x1="160" y1="360" x2="1500" y2="360" stroke="#eceff3"/>
    <text x="140" y="785" text-anchor="end">0</text>
    <text x="140" y="645" text-anchor="end">0.25</text>
    <text x="140" y="505" text-anchor="end">0.5</text>
    <text x="140" y="365" text-anchor="end">0.75</text>
    <text x="140" y="225" text-anchor="end">1.0</text>
  </g>
  <!-- grouped bars: 3 tasks, 3 methods -->
  <g>
    <rect x="280" y="540" width="80" height="240" fill="#d4d8df"/>
    <rect x="370" y="430" width="80" height="350" fill="#a8afbb"/>
    <rect x="460" y="290" width="80" height="490" fill="#0e0e10"/>

    <rect x="720" y="600" width="80" height="180" fill="#d4d8df"/>
    <rect x="810" y="500" width="80" height="280" fill="#a8afbb"/>
    <rect x="900" y="380" width="80" height="400" fill="#0e0e10"/>

    <rect x="1160" y="500" width="80" height="280" fill="#d4d8df"/>
    <rect x="1250" y="400" width="80" height="380" fill="#a8afbb"/>
    <rect x="1340" y="260" width="80" height="520" fill="#0e0e10"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="16" fill="#3a3a40" text-anchor="middle">
    <text x="410" y="820">Task A</text>
    <text x="850" y="820">Task B</text>
    <text x="1290" y="820">Task C</text>
  </g>
  <!-- legend -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#3a3a40">
    <rect x="1180" y="140" width="16" height="16" fill="#d4d8df"/><text x="1204" y="153">Baseline</text>
    <rect x="1300" y="140" width="16" height="16" fill="#a8afbb"/><text x="1324" y="153">Prior SOTA</text>
    <rect x="1440" y="140" width="16" height="16" fill="#0e0e10"/><text x="1464" y="153">Ours</text>
  </g>
</svg>
